  WordPress Custom HTML block for https://sidhu-finanzen.de/immobilien/

  Shareable detail URLs:
  - List:   https://sidhu-finanzen.de/immobilien/
  - Detail: https://sidhu-finanzen.de/immobilien/?immobilie=33
  - Pretty: https://sidhu-finanzen.de/immobilien/33/ (requires wordpress/immobilien-rewrite.php in functions.php)

  Paste everything below into the page editor (Custom HTML block).
-->

<iframe
  id="sidhu-properties"
  src="https://sidhu-finanzen.vercel.app/immobilien"
  title="Aktive Immobilien"
  style="width:100%;border:0;display:block;"
  loading="lazy"
  referrerpolicy="strict-origin-when-cross-origin"
></iframe>

<script>
  (function () {
    var iframe = document.getElementById('sidhu-properties')
    if (!iframe) return

    var appOrigin = 'https://sidhu-finanzen.vercel.app'
    var parentBasePath = '/immobilien'
    var propertyQueryKey = 'immobilie'

    function iframeSrcForPropertyId(propertyId) {
      return propertyId
        ? appOrigin + '/immobilien/' + propertyId
        : appOrigin + '/immobilien'
    }

    function getPropertyIdFromUrl() {
      var url = new URL(window.location.href)
      var fromQuery = url.searchParams.get(propertyQueryKey)
      if (fromQuery) return fromQuery

      var legacyMatch = url.pathname.match(/\/immobilien\/(\d+)\/?$/)
      return legacyMatch ? legacyMatch[1] : null
    }

    function parentUrlForPropertyId(propertyId) {
      var url = new URL(window.location.href)
      url.pathname = parentBasePath + '/'

      if (propertyId) {
        url.searchParams.set(propertyQueryKey, propertyId)
      } else {
        url.searchParams.delete(propertyQueryKey)
      }

      return url.pathname + url.search
    }

    function normalizeLegacyPathUrl() {
      var url = new URL(window.location.href)
      var legacyMatch = url.pathname.match(/\/immobilien\/(\d+)\/?$/)

      if (!legacyMatch) return

      url.pathname = parentBasePath + '/'
      url.searchParams.set(propertyQueryKey, legacyMatch[1])
      window.history.replaceState({ propertyId: legacyMatch[1] }, '', url.pathname + url.search)
    }

    function syncIframeFromParentUrl() {
      normalizeLegacyPathUrl()
      iframe.src = iframeSrcForPropertyId(getPropertyIdFromUrl())
    }

    syncIframeFromParentUrl()

    window.addEventListener('message', function (event) {
      if (event.origin !== appOrigin || !event.data) return

      if (event.data.type === 'sidhu-iframe-resize') {
        var height = Number(event.data.height)
        if (height > 0) iframe.style.height = height + 'px'
      }

      if (event.data.type === 'sidhu-iframe-navigate') {
        var nextUrl = parentUrlForPropertyId(event.data.propertyId)
        var currentUrl = window.location.pathname + window.location.search
        if (currentUrl === nextUrl) return
        window.history.pushState({ propertyId: event.data.propertyId }, '', nextUrl)
      }
    })

    window.addEventListener('popstate', syncIframeFromParentUrl)
  })()
</script>
